services:
  app:
    build:
      context: ./Código/backend
    container_name: laravel_app
    volumes:
      - ./Código/backend:/var/www/html
    working_dir: /var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_DATABASE=lumimusic
      - DB_USERNAME=root
      - DB_PASSWORD=root
    ports:
      - "8000:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: lumimusic
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  frontend:
    build:
      context: ./Código/frontend
    container_name: react_app
    volumes:
      - ./Código/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true

volumes:
  dbdata: